version: '3.8'

services:
  # 🧠 1. BACKEND SERVICE CONTAINER CONFIGURATION
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=${MONGO_URI}
    restart: always

  # 💻 2. FRONTEND SERVICE CONTAINER CONFIGURATION
  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5000/api
    depends_on:
      - backend
    restart: always